name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: campus
          POSTGRES_PASSWORD: campus
          POSTGRES_DB: campus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U campus -d campus_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://campus:campus@localhost:5432/campus_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-jwt-secret
      PORT: 3100

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @campus-activity/server db:generate

      - name: Prepare test database
        run: pnpm --filter @campus-activity/server db:push

      - name: Typecheck
        run: pnpm typecheck

      - name: Run Vitest suites
        run: pnpm -r test:run

      - name: Install Playwright browser
        run: pnpm --filter @campus-activity/web exec playwright install --with-deps chromium

      - name: Run mock E2E
        run: pnpm --filter @campus-activity/web test:e2e

      - name: Run real backend E2E
        run: pnpm --filter @campus-activity/web test:e2e:real
